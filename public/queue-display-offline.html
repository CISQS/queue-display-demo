<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue Display Offline</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #000;
      background: linear-gradient(90deg, #eedcac 0%, #bce4be 100%);
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
    }

    .station-button {
      margin: 8px;
      padding: 12px 18px 12px 20px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      text-align: left;
      cursor: pointer;
      color: #000;
      border-radius: 18px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .station-button:hover {
      background: rgba(0, 141, 99, 0.06);
      transform: translateY(-1px);
    }

    .station-button:focus-visible {
      outline: 3px solid rgba(42, 169, 184, 0.28);
      outline-offset: 2px;
    }

    .station-copy {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
      font-family: Arial, Helvetica, sans-serif;
    }

    .station-copy #stationZh {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .station-copy #stationEn {
      margin-top: 2px;
      font-size: 24px;
      font-weight: 700;
    }

    .meta {
      margin: 8px;
      display: flex;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
    }

    .meta-copy {
      text-align: center;
      font-size: 12px;
      line-height: 1.2;
      color: #2f2f2f;
    }

    .meta-button {
      border: 0;
      padding: 0;
      background: transparent;
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .meta-button:focus-visible {
      outline: 3px solid rgba(42, 169, 184, 0.28);
      outline-offset: 6px;
      border-radius: 12px;
    }

    .meta-copy .clock {
      display: inline-block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .meta-mark {
      margin-left: 18px;
      min-height: 80px;
      opacity: 0.42;
      flex: 0 0 auto;
    }

    .board {
      min-height: 380px;
      width: 100%;
      padding: 10px 0 4px;
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      padding: 0 40px 10px;
      font-size: 40px;
      letter-spacing: 0.01em;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 40px;
    }

    .row:last-child {
      padding-bottom: 18px;
    }

    .ticket-box {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 320px;
      height: 64px;
      border: 0;
      background: #edeedd;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 40px;
      font-weight: 600;
      color: #000;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(83, 82, 77, 0.06), 0 4px 12px rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .ticket-box:disabled {
      cursor: default;
    }

    .ticket-box:not(:disabled):hover {
      background: #f1f2e7;
      box-shadow: inset 0 0 0 1px rgba(83, 82, 77, 0.08), 0 8px 18px rgba(0, 0, 0, 0.08);
      transform: translateY(-1px);
    }

    .ticket-box:focus-visible {
      outline: 3px solid rgba(42, 169, 184, 0.28);
      outline-offset: 2px;
    }

    .counter-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 224px;
      height: 64px;
      border: 0;
      background: #edeedd;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 40px;
      font-weight: 600;
      cursor: pointer;
      color: #000;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(83, 82, 77, 0.06), 0 4px 12px rgba(0, 0, 0, 0.05);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .counter-button:hover {
      background: #f1f2e7;
      box-shadow: inset 0 0 0 1px rgba(83, 82, 77, 0.08), 0 8px 18px rgba(0, 0, 0, 0.08);
      transform: translateY(-1px);
    }

    .counter-button:focus-visible {
      outline: 3px solid rgba(42, 169, 184, 0.28);
      outline-offset: 2px;
    }

    .waiting {
      margin: 4px 0 10px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
      border-top: 1px solid rgba(83, 82, 77, 0.08);
      border-bottom: 1px solid rgba(83, 82, 77, 0.08);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
    }

    .waiting-left {
      width: 66.666%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .waiting-icon {
      margin: 0 20px;
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
    }

    .waiting-title {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.2;
    }

    .waiting-right {
      width: 33.333%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .waiting-number {
      margin: 0 16px;
      font-size: 72px;
      font-weight: 600;
      font-family: Arial, Helvetica, sans-serif;
    }

    .waiting-unit {
      font-size: 32px;
      line-height: 1.2;
      font-family: Arial, Helvetica, sans-serif;
    }

    .notice-toggle {
      margin: 6px 0 4px;
      height: 100px;
      display: flex;
      align-items: center;
      width: 100%;
      border: 0;
      background: #fff;
      color: #000;
      text-align: left;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 30px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
      transition: background 0.18s ease;
    }

    .notice-toggle:hover {
      background: #fcfcf7;
    }

    .notice-icon {
      margin: 0 20px;
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
    }

    .notice-grid {
      flex: 1 1 auto;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      overflow: auto;
      gap: 12px;
      padding: 18px 16px 24px;
      background: #f6f9f1;
      font-family: Arial, Helvetica, sans-serif;
      color: #53524d;
    }

    .notice-tag {
      padding: 10px 16px;
      border: 0;
      background: #fff;
      color: #53524d;
      font-size: 40px;
      font-weight: 600;
      border-radius: 8px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .notice-tag:hover {
      background: #fcfcf7;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(-1px);
    }

    .notice-tag:focus-visible {
      outline: 3px solid rgba(42, 169, 184, 0.28);
      outline-offset: 2px;
    }

    @media (max-width: 700px) {
      .header,
      .row,
      .board-header,
      .waiting,
      .notice-toggle {
        flex-direction: column;
        align-items: stretch;
      }

      .row {
        gap: 12px;
      }

      .ticket-box,
      .counter-button {
        width: 100%;
      }

      .waiting-left,
      .waiting-right {
        width: 100%;
        justify-content: flex-start;
        padding: 12px 20px;
      }
    }

    .nurse-screen {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #f1e8c4 0%, #dff0cc 100%);
    }

    .nurse-top {
      height: 96px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #008d63;
      color: #fff;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .nurse-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
    }

    .nurse-ticket {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 120px;
      font-weight: 600;
      color: #000;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    .doctor-table-wrap {
      width: 100%;
      padding: 16px 40px 8px;
    }

    .doctor-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 16px;
    }

    .doctor-table th {
      padding-bottom: 8px;
      text-align: left;
      font-size: 40px;
      font-weight: 400;
    }

    .doctor-ticket-cell {
      padding-right: 32px;
    }

    .doctor-ticket-box,
    .doctor-name-box {
      display: flex;
      height: 80px;
      align-items: center;
      justify-content: center;
      background: #edeedd;
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .doctor-ticket-box {
      min-width: 280px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 42px;
      font-weight: 600;
    }

    .doctor-name-box {
      min-width: 260px;
      padding: 0 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 33px;
      font-weight: 600;
      line-height: 1;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <button id="stationButton" class="station-button" type="button" title="點擊切換 station">
        <div class="station-copy">

    </div>

    <div class="waiting">
      <div class="waiting-left">
        <svg class="waiting-icon" viewBox="0 0 473.068 473.068" fill="#000000" aria-hidden="true">
          <g>

              <path d="M355.507,181.955c8.793-6.139,29.39-20.519,29.39-55.351v-71.77h9.814c4.49,0,8.17-3.679,8.17-8.169v-38.5 c0-4.49-3.681-8.165-8.17-8.165H78.351c-4.495,0-8.165,3.675-8.165,8.165v38.5c0,4.491,3.67,8.169,8.165,8.169h9.82v73.071 c0,34.499,10.502,42.576,29.074,53.89l80.745,49.203v20.984c-20.346,12.23-73.465,44.242-80.434,49.107 c-8.793,6.135-29.384,20.51-29.384,55.352v61.793h-9.82c-4.495,0-8.165,3.676-8.165,8.166v38.498c0,4.49,3.67,8.17,8.165,8.17 h316.361c4.49,0,8.17-3.68,8.17-8.17V426.4c0-4.49-3.681-8.166-8.17-8.166h-9.814v-63.104c0-34.493-10.508-42.572-29.069-53.885 l-80.745-49.202v-20.987C295.417,218.831,348.537,186.822,355.507,181.955z M252.726,272.859l87.802,53.5 c6.734,4.109,10.333,6.373,12.001,9.002c1.991,3.164,2.963,9.627,2.963,19.768v63.104H117.574v-61.793 c0-19.507,9.718-26.289,16.81-31.242c5.551-3.865,54.402-33.389,85.878-52.289c4.428-2.658,7.135-7.441,7.135-12.611v-37.563 c0-5.123-2.671-9.883-7.053-12.55l-87.54-53.339l-0.265-0.165c-6.741-4.105-10.336-6.369-11.998-9.009 c-1.992-3.156-2.968-9.626-2.968-19.767V54.835h237.918v71.77c0,19.5-9.718,26.288-16.814,31.235 c-5.546,3.872-54.391,33.395-85.869,52.295c-4.427,2.658-7.134,7.442-7.134,12.601v37.563 C245.675,265.431,248.346,270.188,252.726,272.859z"></path>

        <div class="waiting-title">
          <div>預計輪候時間</div>
          <div>Estimated waiting time</div>

      </div>
      <div class="waiting-right">
        <div id="waitingMins" class="waiting-number"></div>
        <div class="waiting-unit">

    <button id="toggleMock" class="notice-toggle" type="button">

        <div>以下號碼請聯絡門診職員</div>
        <div>For the following numbers, please approach our staff</div>

    <div id="noticeGrid" class="notice-grid"></div>

  <script>
    const STATIONS = [
      { key: "dr", labelZh: "醫生站", labelEn: "Doctor Station", wait: 15, columnZh: "醫生", columnEn: "Doctor" },
      { key: "nurse", labelZh: "護士分流站", labelEn: "Nurse Station", wait: 10, columnZh: "櫃位", columnEn: "Counter" },
      { key: "pharmacy", labelZh: "藥房", labelEn: "Pharmacy", wait: 20, columnZh: "櫃位", columnEn: "Counter" }
    ];

    const COUNTER_CYCLE = ["", "OPD001", "OPD002", "OPD003"];
    const DOCTOR_NAMES = ["常健康", "常開心", "常快樂", "常輕鬆"];
    const MOCK_TICKET_CYCLE = ["", "OPD001", "OPD002", "OPD003", "OPD004"];
    const FIXED_MISSED_TICKETS = Array.from({ length: 11 }, (_, idx) => `OPD${String(200 + idx).padStart(3, "0")}`);
    const FIXED_MOCK_STORAGE_PREFIX = "queue-display-fixed-notice";

    let stationIndex = 0;
    let showFixedMock = true;
    let passedTickets = [];
    const hiddenFixedNoticeTickets = new Set();
    const rowsState = [1, 2, 3, 4].map((counter) => ({ counter, ticket: "" }));

    const stationButton = document.getElementById("stationButton");
    const stationZh = document.getElementById("stationZh");
    const stationEn = document.getElementById("stationEn");
    const clock = document.getElementById("clock");
    const fullscreenToggle = document.getElementById("fullscreenToggle");
    const counterLabel = document.getElementById("counterLabel");
    const waitingMins = document.getElementById("waitingMins");
    const rows = document.getElementById("rows");
    const doctorScreen = document.getElementById("doctorScreen");
    const doctorRows = document.getElementById("doctorRows");
    const toggleMock = document.getElementById("toggleMock");
    const noticeGrid = document.getElementById("noticeGrid");
    const nurseScreen = document.getElementById("nurseScreen");
    const nurseTicket = document.getElementById("nurseTicket");
    const header = document.querySelector(".header");
    const board = document.querySelector(".board");
    const waiting = document.querySelector(".waiting");

    function currentStation() {
      return STATIONS[stationIndex];
    }

    function getFixedMockStorageKey(stationKey) {
      return `${FIXED_MOCK_STORAGE_PREFIX}:${stationKey}`;
    }

    function applyFixedMockState(state) {
      showFixedMock = state.showFixedMock;
      hiddenFixedNoticeTickets.clear();
      state.hiddenFixedNoticeTickets.forEach((ticket) => hiddenFixedNoticeTickets.add(ticket));
    }

    function loadFixedMockState() {
      try {
        const raw = window.localStorage.getItem(getFixedMockStorageKey(currentStation().key));
        if (!raw) {
          return { showFixedMock: true, hiddenFixedNoticeTickets: [] };
        }
        const parsed = JSON.parse(raw);
        return {
          showFixedMock: parsed?.showFixedMock ?? true,
          hiddenFixedNoticeTickets: Array.isArray(parsed?.hiddenFixedNoticeTickets) ? parsed.hiddenFixedNoticeTickets : [],
        };
      } catch {
        return { showFixedMock: true, hiddenFixedNoticeTickets: [] };
      }
    }

    function persistFixedMockState() {
      window.localStorage.setItem(
        getFixedMockStorageKey(currentStation().key),
        JSON.stringify({
          showFixedMock,
          hiddenFixedNoticeTickets: [...hiddenFixedNoticeTickets],
        })
      );
    }

    function formatDateTimeDDMMYYYYHHmmss(date) {
      const dd = String(date.getDate()).padStart(2, "0");
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const yyyy = String(date.getFullYear());
      const hh = String(date.getHours()).padStart(2, "0");
      const min = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return `${dd}-${mm}-${yyyy} ${hh}:${min}:${ss}`;
    }

    function renderClock() {
      clock.textContent = formatDateTimeDDMMYYYYHHmmss(new Date());
    }

    async function toggleFullscreen() {
      const doc = document;
      const root = document.documentElement;
      const fullscreenElement = doc.fullscreenElement || doc.webkitFullscreenElement;
      try {
        if (fullscreenElement) {
          if (doc.exitFullscreen) await doc.exitFullscreen();
          else if (doc.webkitExitFullscreen) await doc.webkitExitFullscreen();
          return;
        }
        if (root.requestFullscreen) await root.requestFullscreen();
        else if (root.webkitRequestFullscreen) await root.webkitRequestFullscreen();
      } catch {
        return;
      }
    }

    function renderHeader() {
      const station = currentStation();
      stationZh.textContent = station.labelZh;
      stationEn.textContent = station.labelEn;
      stationButton.title = `目前顯示 ${station.labelZh} ${station.labelEn}，點擊切換 station`;
      stationButton.setAttribute("aria-label", `切換 station，目前顯示 ${station.labelZh} ${station.labelEn}`);
      counterLabel.textContent = `${station.columnZh} ${station.columnEn}`;
      waitingMins.textContent = String(station.wait);
      applyStationLayout();
    }

    function applyStationLayout() {
      const isNurse = currentStation().key === "nurse";
      const isDoctor = currentStation().key === "dr";
      nurseScreen.style.display = isNurse ? "flex" : "none";
      doctorScreen.style.display = isDoctor ? "block" : "none";
      board.style.display = isNurse || isDoctor ? "none" : "block";
      waiting.style.display = isNurse || isDoctor ? "none" : "flex";
      toggleMock.style.display = isNurse || isDoctor ? "none" : "flex";
      noticeGrid.style.display = isNurse || isDoctor ? "none" : "flex";
      if (isNurse) {
        nurseTicket.textContent = rowsState.find((item) => item.counter === 1)?.ticket || "";
      }
    }

    function cycleCounter(counter) {
      if (currentStation().key === "nurse") return;
      const row = rowsState.find((item) => item.counter === counter);
      if (!row) return;
      const currentIndex = COUNTER_CYCLE.indexOf(row.ticket);
      const nextIndex = currentIndex < 0 ? 1 : (currentIndex + 1) % COUNTER_CYCLE.length;
      row.ticket = COUNTER_CYCLE[nextIndex];
      renderRows();
    }

    function nextMockTicket(current) {
      const idx = MOCK_TICKET_CYCLE.indexOf(current);
      if (idx < 0) return MOCK_TICKET_CYCLE[1];
      return MOCK_TICKET_CYCLE[(idx + 1) % MOCK_TICKET_CYCLE.length];
    }

    function appendPassedTicket(items, ticket) {
      return [...items.filter((item) => item !== ticket), ticket].slice(-120);
    }

    function moveCounterTicketToPassed(counter) {
      if (currentStation().key === "nurse") return;
      const row = rowsState.find((item) => item.counter === counter);
      if (!row || !row.ticket) return;
      passedTickets = appendPassedTicket(passedTickets, row.ticket);
      row.ticket = "";
      renderRows();
      renderNotice();
    }

    function toggleNurseMockTicket() {
      if (currentStation().key !== "nurse") return;
      const row = rowsState.find((item) => item.counter === 1);
      if (!row) return;
      row.ticket = nextMockTicket(row.ticket);
      applyStationLayout();
    }

    function dismissPassedTicket(ticket) {
      const nextPassedTickets = passedTickets.filter((item) => item !== ticket);
      if (nextPassedTickets.length !== passedTickets.length) {
        passedTickets = nextPassedTickets;
      } else {
        hiddenFixedNoticeTickets.add(ticket);
        persistFixedMockState();
      }
      renderNotice();
    }

    function renderRows() {
      if (currentStation().key === "nurse") {
        applyStationLayout();
        return;
      }
      if (currentStation().key === "dr") {
        applyStationLayout();
        doctorRows.innerHTML = "";
        rowsState.forEach((row, index) => {
          const tr = document.createElement("tr");

          const ticketCell = document.createElement("td");
          ticketCell.className = "doctor-ticket-cell";
          const ticketBox = document.createElement("button");
          ticketBox.type = "button";
          ticketBox.className = "doctor-ticket-box";
          ticketBox.textContent = row.ticket;
          ticketBox.addEventListener("click", () => {
            row.ticket = nextMockTicket(row.ticket);
            renderRows();
          });
          ticketCell.appendChild(ticketBox);

          const doctorCell = document.createElement("td");
          const doctorBox = document.createElement("button");
          doctorBox.type = "button";
          doctorBox.className = "doctor-name-box";
          doctorBox.textContent = DOCTOR_NAMES[index] || "";
          doctorBox.addEventListener("click", () => {
            row.ticket = nextMockTicket(row.ticket);
            renderRows();
          });
          doctorCell.appendChild(doctorBox);

          tr.appendChild(ticketCell);
          tr.appendChild(doctorCell);
          doctorRows.appendChild(tr);
        });
        return;
      }
      rows.innerHTML = "";
      rowsState.forEach((row, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "row";

        const left = document.createElement("div");
        const ticket = document.createElement(currentStation().key === "dr" ? "div" : "button");
        if (currentStation().key !== "dr") {
          ticket.type = "button";
          ticket.disabled = !row.ticket;
          ticket.addEventListener("click", () => moveCounterTicketToPassed(row.counter));
        }
        ticket.className = "ticket-box";
        ticket.textContent = row.ticket;
        left.appendChild(ticket);

        const right = document.createElement("div");
        if (currentStation().key === "dr") {
          const doctor = document.createElement("div");
          doctor.className = "counter-button";
          doctor.textContent = DOCTOR_NAMES[index] || "";
          right.appendChild(doctor);
        } else {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "counter-button";
          button.textContent = row.ticket ? String(row.counter) : "";
          button.addEventListener("click", () => cycleCounter(row.counter));
          right.appendChild(button);
        }

        wrapper.appendChild(left);
        wrapper.appendChild(right);
        rows.appendChild(wrapper);
      });
    }

    function renderNotice() {
      noticeGrid.innerHTML = "";
      const mergedNoticeTickets = [];
      const fixedSet = new Set();

      if (showFixedMock) {
        FIXED_MISSED_TICKETS.filter((ticket) => !hiddenFixedNoticeTickets.has(ticket)).forEach((ticket) => {
          mergedNoticeTickets.push({ ticket, isFixed: true });
          fixedSet.add(ticket);
        });
      }

      passedTickets.forEach((ticket) => {
        if (fixedSet.has(ticket)) return;
        mergedNoticeTickets.push({ ticket, isFixed: false });
      });

      mergedNoticeTickets.forEach(({ ticket }) => {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "notice-tag";
        item.textContent = ticket;
        item.addEventListener("click", () => dismissPassedTicket(ticket));
        noticeGrid.appendChild(item);
      });
    }

    stationButton.addEventListener("click", () => {
      stationIndex = (stationIndex + 1) % STATIONS.length;
      applyFixedMockState(loadFixedMockState());
      renderHeader();
      renderNotice();
    });

    toggleMock.addEventListener("click", () => {
      if (showFixedMock) {
        showFixedMock = false;
      } else {
        showFixedMock = true;
        hiddenFixedNoticeTickets.clear();
      }
      persistFixedMockState();
      renderNotice();
    });

    nurseTicket.addEventListener("click", toggleNurseMockTicket);
    fullscreenToggle.addEventListener("click", toggleFullscreen);

    renderClock();
    setInterval(renderClock, 1000);
    renderHeader();
    renderRows();
    applyFixedMockState(loadFixedMockState());
    renderNotice();
  </script>
</body>
</html>
